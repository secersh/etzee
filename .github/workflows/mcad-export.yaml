name: 🔧 MCAD Export

on:
  workflow_call:
    inputs:
      parts_file:
        description: "Path to parts.yaml relative to repo root"
        type: string
        required: true
      onshape_configuration:
        description: "OnShape configuration string as comma-separated key=value pairs (e.g. Param1=Value1,Param2=Value2)"
        type: string
        required: true
      artifact_suffix:
        description: "Suffix for artifact names (e.g. b11-Normal-5col)"
        type: string
        required: true
    secrets:
      ONSHAPE_API_ACCESS_KEY:
        required: true
      ONSHAPE_API_SECRET_KEY:
        required: true

jobs:
  export:
    name: 🏭 Export (${{ inputs.artifact_suffix }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate AUTH
        run: |
          AUTH=$(printf "%s:%s" "${{ secrets.ONSHAPE_API_ACCESS_KEY }}" "${{ secrets.ONSHAPE_API_SECRET_KEY }}" | base64 | tr -d '\n')
          echo "::add-mask::$AUTH"
          echo "AUTH=$AUTH" >> $GITHUB_ENV

      - name: Generate ENCODED_CONFIG
        run: |
          ENCODED_CONFIG=$(jq -rn --arg config "${{ inputs.onshape_configuration }}" '$config | @uri')
          echo "ENCODED_CONFIG=$ENCODED_CONFIG" >> $GITHUB_ENV

      - name: Resolve part IDs from OnShape
        id: read_parts
        run: |
          echo "::notice:: 📋 Reading part numbers from ${{ inputs.parts_file }}..."

          PART_NUMBERS=$(python3 -c "
          import yaml
          with open('${{ inputs.parts_file }}') as f:
              data = yaml.safe_load(f)
          nums = [p['part_number'] for p in data['parts'] if p.get('part_number', '').strip()]
          print('\n'.join(nums))
          ")

          if [ -z "$PART_NUMBERS" ]; then
            echo "::error:: 🚨 No part numbers found in ${{ inputs.parts_file }}."
            exit 1
          fi

          echo "::notice:: 🔍 Fetching parts list from OnShape..."

          ONSHAPE_PARTS=$(curl -s -X 'GET' \
          "https://cad.onshape.com/api/v10/parts/d/${{ vars.DID }}/w/${{ vars.WVMID }}/e/${{ vars.EID }}?includeFlatParts=true&configuration=$ENCODED_CONFIG" \
          -H "Accept: application/json" \
          -H "Authorization: Basic $AUTH")

          PART_RESOLUTION=$(ONSHAPE_PARTS_JSON="$ONSHAPE_PARTS" PART_NUMBERS_LIST="$PART_NUMBERS" python3 -c "
          import json, sys, os
          parts = json.loads(os.environ['ONSHAPE_PARTS_JSON'])
          part_numbers = os.environ['PART_NUMBERS_LIST'].strip().splitlines()
          id_map = {p['partNumber']: p['partId'] for p in parts if p.get('partNumber')}
          missing = [n for n in part_numbers if n not in id_map]
          if missing:
              for n in missing:
                  print(f'Part number not found in OnShape: {n}', file=sys.stderr)
              sys.exit(1)
          print(','.join(id_map[n] for n in part_numbers))
          print(','.join(part_numbers))
          ")

          if [ $? -ne 0 ]; then
            echo "::error:: 🚨 Some part numbers from ${{ inputs.parts_file }} were not found in OnShape. Check that part numbers match the partNumber property set in OnShape (right-click → Properties)."
            exit 1
          fi

          PART_IDS=$(echo "$PART_RESOLUTION" | sed -n '1p')
          PART_NAMES=$(echo "$PART_RESOLUTION" | sed -n '2p')

          echo "part_ids=$PART_IDS" >> $GITHUB_OUTPUT
          echo "part_names=$PART_NAMES" >> $GITHUB_OUTPUT

      - name: Export STEP files
        env:
          PART_IDS: ${{ steps.read_parts.outputs.part_ids }}
          PART_NAMES: ${{ steps.read_parts.outputs.part_names }}
        run: |
          echo "::notice:: 📐 Exporting STEP files from OnShape (${{ inputs.artifact_suffix }})..."

          mkdir -p manufacturing/step

          IFS=',' read -ra NAMES <<< "$PART_NAMES"
          IFS=',' read -ra IDS <<< "$PART_IDS"

          for i in "${!NAMES[@]}"; do
            NAME="${NAMES[$i]}"
            PID="${IDS[$i]}"

            echo "::notice:: 📤 Submitting STEP export for part: $NAME (id: $PID)..."

            JSON_BODY=$(jq -n \
              --arg partIds "$PID" \
              '{resolution:"FINE",storeInDocument:false,partIds:$partIds,formatName:"STEP",grouping:false,specifyUnits:true,unit:"MILLIMETER",scale:"1.0"}')

            SUBMIT_RES=$(curl -s -X 'POST' \
            "https://cad.onshape.com/api/v10/partstudios/d/${{ vars.DID }}/w/${{ vars.WVMID }}/e/${{ vars.EID }}/translations?configuration=$ENCODED_CONFIG" \
            -H "Accept: application/json" \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/json" \
            -d "$JSON_BODY")

            HREF=$(echo "$SUBMIT_RES" | jq -r '.href')

            if [ -z "$HREF" ] || [ "$HREF" == "null" ]; then
              echo "::error:: 🚨 Failed to submit STEP export request for part: $NAME"
              exit 1
            fi

            echo "::notice:: 📥 Waiting for STEP file to be ready for part: $NAME..."

            ATTEMPTS=0
            MAX_ATTEMPTS=60
            while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
              STATUS_RES=$(curl -s -X 'GET' "$HREF" \
              -H "Accept: application/json" \
              -H "Authorization: Basic $AUTH")

              STATUS=$(echo "$STATUS_RES" | jq -r '.requestState')

              echo "::notice:: Current status: $STATUS"

              if [ -z "$STATUS" ]; then
                echo "::error:: 🚨 Failed to retrieve STEP export status for part: $NAME"
                exit 1
              fi

              if [ "$STATUS" == "DONE" ]; then
                echo "::notice:: ✅ STEP file ready for part: $NAME"
                FID=$(echo "$STATUS_RES" | jq -r '.resultExternalDataIds[0]')
                break
              elif [ "$STATUS" == "FAILED" ]; then
                echo "::error:: 🚨 STEP export failed for part: $NAME"
                exit 1
              else
                echo "::notice:: ⏳ STEP file still being processed..."
                sleep 5
              fi

              ATTEMPTS=$((ATTEMPTS + 1))
            done

            if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
              echo "::error:: 🚨 STEP export timed out for part: $NAME"
              exit 1
            fi

            echo "::notice:: 📥 Downloading STEP file with ID: $FID (part: $NAME)"
            curl -s -X 'GET' \
            "https://cad.onshape.com/api/v10/documents/d/${{ vars.DID }}/externaldata/$FID" \
            -H "Accept: application/octet-stream" \
            -H "Authorization: Basic $AUTH" \
            -o "manufacturing/step/${NAME}.zip"

            if [ $? -ne 0 ]; then
              echo "::error:: 🚨 Failed to download STEP file for part: $NAME"
              exit 1
            fi

            TMPDIR="manufacturing/step/${NAME}_tmp"
            unzip -o "manufacturing/step/${NAME}.zip" -d "$TMPDIR"
            STEP_FILE=$(find "$TMPDIR" -maxdepth 1 -iname "*.step" | head -1)
            if [ -z "$STEP_FILE" ]; then
              echo "::error:: 🚨 No STEP file found inside zip for part: $NAME"
              exit 1
            fi
            mv "$STEP_FILE" "manufacturing/step/${NAME}.step"
            rm -rf "$TMPDIR" "manufacturing/step/${NAME}.zip"
          done

      - name: Export STL files
        env:
          PART_IDS: ${{ steps.read_parts.outputs.part_ids }}
          PART_NAMES: ${{ steps.read_parts.outputs.part_names }}
        run: |
          echo "::notice:: 🖨️ Exporting STL files from OnShape (${{ inputs.artifact_suffix }})..."

          mkdir -p manufacturing/stl

          IFS=',' read -ra NAMES <<< "$PART_NAMES"
          IFS=',' read -ra IDS <<< "$PART_IDS"

          for i in "${!NAMES[@]}"; do
            NAME="${NAMES[$i]}"
            PID="${IDS[$i]}"

            echo "::notice:: 📤 Submitting STL export for part: $NAME (id: $PID)..."

            JSON_BODY=$(jq -n \
              --arg partIds "$PID" \
              '{storeInDocument:false,partIds:$partIds,formatName:"STL",grouping:false,specifyUnits:true,unit:"MILLIMETER",scale:"1.0",angularTolerance:0.05,chordTolerance:0.01}')

            SUBMIT_RES=$(curl -s -X 'POST' \
            "https://cad.onshape.com/api/v10/partstudios/d/${{ vars.DID }}/w/${{ vars.WVMID }}/e/${{ vars.EID }}/translations?configuration=$ENCODED_CONFIG" \
            -H "Accept: application/json" \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/json" \
            -d "$JSON_BODY")

            HREF=$(echo "$SUBMIT_RES" | jq -r '.href')

            if [ -z "$HREF" ] || [ "$HREF" == "null" ]; then
              echo "::error:: 🚨 Failed to submit STL export request for part: $NAME"
              exit 1
            fi

            echo "::notice:: 📥 Waiting for STL file to be ready for part: $NAME..."

            ATTEMPTS=0
            MAX_ATTEMPTS=60
            while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
              STATUS_RES=$(curl -s -X 'GET' "$HREF" \
              -H "Accept: application/json" \
              -H "Authorization: Basic $AUTH")

              STATUS=$(echo "$STATUS_RES" | jq -r '.requestState')

              echo "::notice:: Current status: $STATUS"

              if [ -z "$STATUS" ]; then
                echo "::error:: 🚨 Failed to retrieve STL export status for part: $NAME"
                exit 1
              fi

              if [ "$STATUS" == "DONE" ]; then
                echo "::notice:: ✅ STL file ready for part: $NAME"
                FID=$(echo "$STATUS_RES" | jq -r '.resultExternalDataIds[0]')
                break
              elif [ "$STATUS" == "FAILED" ]; then
                echo "::error:: 🚨 STL export failed for part: $NAME"
                exit 1
              else
                echo "::notice:: ⏳ STL file still being processed..."
                sleep 5
              fi

              ATTEMPTS=$((ATTEMPTS + 1))
            done

            if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
              echo "::error:: 🚨 STL export timed out for part: $NAME"
              exit 1
            fi

            echo "::notice:: 📥 Downloading STL file with ID: $FID (part: $NAME)"
            curl -s -X 'GET' \
            "https://cad.onshape.com/api/v10/documents/d/${{ vars.DID }}/externaldata/$FID" \
            -H "Accept: application/octet-stream" \
            -H "Authorization: Basic $AUTH" \
            -o "manufacturing/stl/${NAME}.zip"

            if [ $? -ne 0 ]; then
              echo "::error:: 🚨 Failed to download STL file for part: $NAME"
              exit 1
            fi

            TMPDIR="manufacturing/stl/${NAME}_tmp"
            unzip -o "manufacturing/stl/${NAME}.zip" -d "$TMPDIR"
            STL_FILE=$(find "$TMPDIR" -maxdepth 1 -iname "*.stl" | head -1)
            if [ -z "$STL_FILE" ]; then
              echo "::error:: 🚨 No STL file found inside zip for part: $NAME"
              exit 1
            fi
            mv "$STL_FILE" "manufacturing/stl/${NAME}.stl"
            rm -rf "$TMPDIR" "manufacturing/stl/${NAME}.zip"
          done

      - name: Upload STEP artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcad-step-${{ inputs.artifact_suffix }}
          path: manufacturing/step/*.step

      - name: Upload STL artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcad-stl-${{ inputs.artifact_suffix }}
          path: manufacturing/stl/*.stl
