# Lists etzee part numbers to be exported by the MCAD manufacturing workflow.
# Part numbers must match the partNumber property set in OnShape
# (right-click a part → Properties → Part Number).
# Only parts listed here will be exported.

parts:

  # common parts
  - part_number: ETZ-B11-TC       # Top cap
  - part_number: ETZ-B11-LGB      # Logic board PCB

  # side specific parts
  - part_number: ETZ-B11-LB       # Left base
  - part_number: ETZ-B11-RB       # Right base
  - part_number: ETZ-B11-LSP      # Left switch plate PCB
  - part_number: ETZ-B11-RSP      # Right switch plate PCB
  - part_number: ETZ-B11-LSC      # Left switch carrier PCB
  - part_number: ETZ-B11-RSC      # Right switch carrier PCB
